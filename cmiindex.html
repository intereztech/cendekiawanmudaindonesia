<!doctype html>
<html lang="id">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kuis Administrasi Sekolah</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&amp;family=Playfair+Display:wght@700&amp;display=swap" rel="stylesheet">
  <style>
        body { font-family: 'DM Sans', sans-serif; }
        .heading-font { font-family: 'Playfair Display', serif; }
        .option-btn { transition: all 0.2s ease; }
        .option-btn:hover { transform: translateY(-2px); }
        .option-btn.selected { border-color: #6366f1; background: #eef2ff; }
        .option-btn.correct { border-color: #22c55e; background: #dcfce7; }
        .option-btn.wrong { border-color: #ef4444; background: #fef2f2; }
        .fade-in { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
  <script src="/_sdk/resizing_sdk.js" type="text/javascript"></script>
 </head>
 <body data-template-id="__page-root" class="min-h-screen"><!-- Start Screen -->
  <div id="start-screen" class="flex items-center justify-center p-4" style="min-height: calc(100 * min(var(--vh, 1vh), 1vh))">
   <div class="w-full max-w-md">
    <div data-template-id="start-card" class="canva-card bg-white rounded-2xl shadow-xl p-8 text-center">
     <div class="w-16 h-16 bg-indigo-100 rounded-full flex items-center justify-center mx-auto mb-4"><i data-lucide="graduation-cap" class="w-8 h-8 text-indigo-600"></i>
     </div>
     <h1 data-template-id="quiz-title" class="canva-text heading-font mb-2"></h1>
     <p data-template-id="quiz-subtitle" class="canva-text mb-6"></p>
     <form id="start-form" class="space-y-4 text-left">
      <div><label data-template-id="nama-label" class="canva-text block mb-1 font-medium" for="nama-input"></label> <input id="nama-input" type="text" required class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
      </div><button data-template-id="start-btn" type="submit" class="canva-button w-full py-3 rounded-lg font-semibold text-lg mt-2"></button>
     </form>
    </div>
   </div>
  </div><!-- Quiz Screen -->
  <div id="quiz-screen" class="hidden p-4" style="min-height: calc(100 * min(var(--vh, 1vh), 1vh))">
   <div class="max-w-2xl mx-auto">
    <div class="flex items-center justify-between mb-6">
     <div data-template-id="timer-box" class="canva-tag flex items-center gap-2 px-4 py-2 rounded-full font-semibold"><i data-lucide="clock" class="w-4 h-4"></i> <span id="timer-display">00:00</span>
     </div>
     <div class="text-sm font-medium text-gray-600"><span id="q-progress">1/15</span>
     </div>
    </div>
    <div class="w-full bg-gray-200 rounded-full h-2 mb-6">
     <div id="progress-bar" class="bg-indigo-600 h-2 rounded-full transition-all duration-300" style="width:6.67%"></div>
    </div>
    <div data-template-id="question-card" class="canva-card bg-white rounded-2xl shadow-lg p-6 fade-in">
     <p id="question-text" class="text-lg font-semibold text-gray-800 mb-5"></p>
     <div id="options-container" class="space-y-3"></div><button id="next-btn" class="hidden w-full mt-6 py-3 bg-indigo-600 text-white rounded-lg font-semibold hover:bg-indigo-700 transition">Selanjutnya</button>
    </div>
   </div>
  </div><!-- Result Screen -->
  <div id="result-screen" class="hidden p-4 pb-12">
   <div class="max-w-4xl mx-auto">
    <div data-template-id="result-card" class="canva-card bg-white rounded-2xl shadow-xl p-8 text-center mb-8 fade-in">
     <div id="result-icon" class="w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4"></div>
     <h2 data-template-id="result-title" class="canva-text heading-font mb-2"></h2>
     <p id="result-name" class="text-gray-600 mb-4"></p>
     <div class="grid grid-cols-3 gap-4 mb-4">
      <div class="bg-green-50 rounded-xl p-3">
       <p class="text-2xl font-bold text-green-600" id="r-benar">0</p>
       <p class="text-xs text-gray-500">Benar</p>
      </div>
      <div class="bg-red-50 rounded-xl p-3">
       <p class="text-2xl font-bold text-red-600" id="r-salah">0</p>
       <p class="text-xs text-gray-500">Salah</p>
      </div>
      <div class="bg-indigo-50 rounded-xl p-3">
       <p class="text-2xl font-bold text-indigo-600" id="r-nilai">0</p>
       <p class="text-xs text-gray-500">Nilai</p>
      </div>
     </div>
     <p id="r-ketuntasan" class="inline-block px-4 py-1.5 rounded-full font-semibold text-sm"></p>
    </div>
    <h3 data-template-id="ranking-title" class="canva-text heading-font mb-4"></h3>
    <div class="overflow-x-auto bg-white rounded-xl shadow">
     <table class="w-full text-sm">
      <thead>
       <tr class="bg-indigo-50 text-indigo-800">
        <th class="px-3 py-3 text-left">No</th>
        <th class="px-3 py-3 text-left">Nama</th>
        <th class="px-3 py-3">Waktu</th>
        <th class="px-3 py-3">Benar</th>
        <th class="px-3 py-3">Salah</th>
        <th class="px-3 py-3">Nilai</th>
        <th class="px-3 py-3">Keterangan</th>
       </tr>
      </thead>
      <tbody id="ranking-body"></tbody>
     </table>
    </div>
    <div class="text-center mt-6"><button id="retry-btn" class="px-6 py-3 bg-indigo-600 text-white rounded-lg font-semibold hover:bg-indigo-700 transition">Kerjakan Lagi</button>
    </div>
   </div>
  </div>
  <script src="/_sdk/editing_sdk.js"></script>
  <script src="/_sdk/data_sdk.js"></script>
  <script>
    const questions = [
        {q:"Administrasi sekolah adalah proses untuk mencapai tujuan pendidikan secara …",o:["Bebas dan mandiri","Efektif dan efisien","Cepat dan praktis","Ketat dan disiplin"],a:1},
        {q:"Berikut yang termasuk ruang lingkup administrasi sekolah adalah …",o:["Pengelolaan sumber daya manusia","Penjualan produk sekolah","Produksi barang industri","Kegiatan perdagangan"],a:0},
        {q:"Administrasi akademik berkaitan dengan …",o:["Pengelolaan keuangan sekolah","Perencanaan kurikulum dan jadwal pelajaran","Perawatan gedung sekolah","Kegiatan koperasi siswa"],a:1},
        {q:"Rekrutmen dan penempatan guru termasuk dalam administrasi …",o:["Akademik","Keuangan","Kepegawaian","Kesiswaan"],a:2},
        {q:"Penyusunan laporan keuangan berkala merupakan bagian dari administrasi …",o:["Kesiswaan","Sarana dan prasarana","Akademik","Keuangan"],a:3},
        {q:"Pengelolaan gedung dan fasilitas sekolah termasuk administrasi …",o:["Kepegawaian","Sarana dan prasarana","Akademik","Kesiswaan"],a:1},
        {q:"Kegiatan ekstrakurikuler merupakan bagian dari administrasi …",o:["Kesiswaan","Keuangan","Akademik","Perencanaan"],a:0},
        {q:"Salah satu manfaat administrasi sekolah adalah …",o:["Mengurangi jumlah siswa","Mempermudah pengambilan keputusan","Menghapus kegiatan belajar","Mengurangi fasilitas sekolah"],a:1},
        {q:"Fungsi administrasi sekolah yang berkaitan dengan penyusunan program kerja disebut …",o:["Pengawasan","Pengarahan","Perencanaan","Evaluasi"],a:2},
        {q:"Membagi tugas dan menyusun struktur organisasi termasuk fungsi …",o:["Pengorganisasian","Pengawasan","Pengarahan","Penilaian"],a:0},
        {q:"Memberikan motivasi dan bimbingan kepada guru termasuk fungsi …",o:["Pengawasan","Pengarahan","Perencanaan","Evaluasi"],a:1},
        {q:"Memantau pelaksanaan dan evaluasi kinerja merupakan fungsi …",o:["Pengorganisasian","Pengawasan","Pengarahan","Perencanaan"],a:1},
        {q:"Tujuan administrasi sekolah adalah menciptakan lingkungan belajar yang …",o:["Bebas aturan","Kondusif","Santai","Sederhana"],a:1},
        {q:"Penegakan tata tertib sekolah termasuk administrasi …",o:["Keuangan","Akademik","Kesiswaan","Sarana prasarana"],a:2},
        {q:"Administrasi sekolah yang efektif dapat meningkatkan …",o:["Pemborosan anggaran","Konflik antar guru","Produktivitas sekolah","Jumlah pelanggaran siswa"],a:2}
    ];

    let currentQ = 0, score = 0, timerInterval, seconds = 0, selectedAnswer = -1, allData = [];
    const labels = ['A','B','C','D'];

    // Data SDK
    const dataHandler = {
        onDataChanged(data) {
            allData = data;
            renderRanking();
        }
    };

    async function initApp() {
        const r = await window.dataSdk.init(dataHandler);
        if (!r.isOk) console.error('SDK init failed');
        lucide.createIcons();
    }

    document.getElementById('start-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const nama = document.getElementById('nama-input').value.trim();
        if (!nama) return;
        startQuiz(nama);
    });

    function startQuiz(nama) {
        window._quizNama = nama;
        currentQ = 0; score = 0; seconds = 0; selectedAnswer = -1;
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        showQuestion();
        timerInterval = setInterval(() => {
            seconds++;
            document.getElementById('timer-display').textContent = formatTime(seconds);
        }, 1000);
    }

    function formatTime(s) {
        return String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
    }

    function showQuestion() {
        selectedAnswer = -1;
        const q = questions[currentQ];
        document.getElementById('question-text').textContent = `${currentQ+1}. ${q.q}`;
        document.getElementById('q-progress').textContent = `${currentQ+1}/15`;
        document.getElementById('progress-bar').style.width = `${((currentQ+1)/15)*100}%`;
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        q.o.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'option-btn w-full text-left border-2 border-gray-200 rounded-xl px-4 py-3 font-medium text-gray-700';
            btn.textContent = `${labels[i]}. ${opt}`;
            btn.onclick = () => selectOption(i);
            container.appendChild(btn);
        });
        document.getElementById('next-btn').classList.add('hidden');
    }

    function selectOption(idx) {
        if (selectedAnswer !== -1) return;
        selectedAnswer = idx;
        const correct = questions[currentQ].a;
        const btns = document.getElementById('options-container').children;
        if (idx === correct) { score++; btns[idx].classList.add('correct'); }
        else { btns[idx].classList.add('wrong'); btns[correct].classList.add('correct'); }
        document.getElementById('next-btn').classList.remove('hidden');
    }

    document.getElementById('next-btn').onclick = () => {
        currentQ++;
        if (currentQ < 15) { showQuestion(); }
        else { endQuiz(); }
    };

    async function endQuiz() {
        clearInterval(timerInterval);
        const nilai = score * 10;
        const ketuntasan = nilai >= 120 ? 'Lulus' : 'Tidak Lulus';

        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('result-name').textContent = window._quizNama;
        document.getElementById('r-benar').textContent = score;
        document.getElementById('r-salah').textContent = 15 - score;
        document.getElementById('r-nilai').textContent = nilai;

        const ketEl = document.getElementById('r-ketuntasan');
        ketEl.textContent = ketuntasan;
        if (nilai >= 120) {
            ketEl.className = 'inline-block px-4 py-1.5 rounded-full font-semibold text-sm bg-green-100 text-green-700';
            document.getElementById('result-icon').className = 'w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4 bg-green-100';
            document.getElementById('result-icon').innerHTML = '<i data-lucide="check-circle" class="w-10 h-10 text-green-600"></i>';
        } else {
            ketEl.className = 'inline-block px-4 py-1.5 rounded-full font-semibold text-sm bg-red-100 text-red-700';
            document.getElementById('result-icon').className = 'w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4 bg-red-100';
            document.getElementById('result-icon').innerHTML = '<i data-lucide="x-circle" class="w-10 h-10 text-red-600"></i>';
        }
        lucide.createIcons();

        if (allData.length >= 999) {
            renderRanking();
            return;
        }
        const result = await window.dataSdk.create({
            nama: window._quizNama,
            waktu: formatTime(seconds),
            jumlah_benar: score,
            jumlah_salah: 15 - score,
            nilai_akhir: nilai,
            ketuntasan: ketuntasan,
            waktu_detik: seconds
        });
    }

    function renderRanking() {
        const sorted = [...allData].sort((a, b) => {
            if (b.nilai_akhir !== a.nilai_akhir) return b.nilai_akhir - a.nilai_akhir;
            return a.waktu_detik - b.waktu_detik;
        });
        const tbody = document.getElementById('ranking-body');
        tbody.innerHTML = '';
        sorted.forEach((item, i) => {
            const tr = document.createElement('tr');
            tr.className = i % 2 === 0 ? 'bg-white' : 'bg-gray-50';
            const lulus = item.nilai_akhir >= 120;
            tr.innerHTML = `
                <td class="px-3 py-2.5">${i+1}</td>
                <td class="px-3 py-2.5 font-medium">${item.nama}</td>
                <td class="px-3 py-2.5 text-center">${item.waktu}</td>
                <td class="px-3 py-2.5 text-center">${item.jumlah_benar}</td>
                <td class="px-3 py-2.5 text-center">${item.jumlah_salah}</td>
                <td class="px-3 py-2.5 text-center font-bold">${item.nilai_akhir}</td>
                <td class="px-3 py-2.5 text-center"><span class="px-2 py-1 rounded text-xs font-semibold ${lulus ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">${item.ketuntasan}</span></td>
            `;
            tbody.appendChild(tr);
        });
    }

    document.getElementById('retry-btn').onclick = () => {
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById('start-screen').classList.remove('hidden');
        document.getElementById('nama-input').value = '';
    };

    initApp();
    </script>
