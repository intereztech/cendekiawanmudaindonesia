<!doctype html>
<html lang="id" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulasi Kompetisi CMI 2026</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="/_sdk/data_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet">
  <style>
        * { font-family: 'Plus Jakarta Sans', sans-serif; }
        html, body { height: 100%; margin: 0; }
        .glass { background: rgba(255,255,255,0.85); backdrop-filter: blur(12px); }
        .gradient-bg { background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%); }
        .card-shadow { box-shadow: 0 20px 60px rgba(0,0,0,0.15); }
        .option-btn { transition: all 0.2s ease; }
        .option-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(59,130,246,0.2); }
        .option-btn.selected { background: #2563eb; color: white; border-color: #2563eb; }
        .option-btn.correct { background: #16a34a; color: white; border-color: #16a34a; }
        .option-btn.wrong { background: #dc2626; color: white; border-color: #dc2626; }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100%{ opacity:1 } 50%{ opacity:0.7 } }
        .fade-in { animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from{ opacity:0; transform:translateY(10px) } to{ opacity:1; transform:translateY(0) } }
        .progress-bar { transition: width 0.3s ease; }
    </style>
  <style>body { box-sizing: border-box; }</style>
 </head>
 <body class="h-full gradient-bg overflow-auto">
  <div id="app" class="w-full min-h-full flex items-center justify-center p-4">
   <!-- Login Screen -->
   <div id="login-screen" class="w-full max-w-md fade-in">
    <div class="glass rounded-3xl p-8 card-shadow">
     <div class="text-center mb-6">
      <img src="https://iili.io/BLzqkYv.jpg" alt="Logo CMI" class="w-24 h-24 mx-auto rounded-2xl object-cover mb-4 shadow-lg" loading="lazy" onerror="this.style.background='#1e3a5f';this.alt='Logo';">
      <h1 id="main-title" class="text-2xl font-800 text-slate-800">Simulasi Kompetisi CMI 2026</h1>
      <p class="text-slate-500 text-sm mt-1">Pengetahuan Umum Jenjang SMP/MTs</p>
     </div>
     <div class="space-y-4">
      <div>
       <label for="nama-input" class="block text-sm font-600 text-slate-700 mb-1">Nama Siswa</label> <input id="nama-input" type="text" placeholder="Masukkan nama lengkap" class="w-full px-4 py-3 rounded-xl border-2 border-slate-200 focus:border-blue-500 focus:outline-none transition">
      </div>
      <div>
       <label for="kelas-input" class="block text-sm font-600 text-slate-700 mb-1">Pilih Kelas</label> <select id="kelas-input" class="w-full px-4 py-3 rounded-xl border-2 border-slate-200 focus:border-blue-500 focus:outline-none transition"> <option value="">-- Pilih Kelas --</option> <option>SMP Kelas VII</option> <option>SMP Kelas VIII</option> <option>SMP Kelas IX</option> <option>MTs Kelas VII</option> <option>MTs Kelas VIII</option> <option>MTs Kelas IX</option> </select>
      </div>
      <div>
       <label for="token-input" class="block text-sm font-600 text-slate-700 mb-1">Nomor Token</label> <input id="token-input" type="text" placeholder="Masukkan token akses" class="w-full px-4 py-3 rounded-xl border-2 border-slate-200 focus:border-blue-500 focus:outline-none transition">
      </div>
      <p id="login-error" class="text-red-500 text-sm hidden"></p><button id="start-btn" class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-700 rounded-xl transition shadow-lg shadow-blue-200"> Mulai Kuis </button>
     </div>
    </div>
   </div><!-- Quiz Screen -->
   <div id="quiz-screen" class="w-full max-w-2xl hidden fade-in">
    <div class="glass rounded-3xl p-6 md:p-8 card-shadow">
     <div class="flex items-center justify-between mb-4">
      <div class="flex items-center gap-2">
       <span class="text-xs font-600 text-slate-500">Soal</span> <span id="q-number" class="text-sm font-800 text-blue-600">1/20</span>
      </div>
      <div class="flex items-center gap-2 bg-red-50 px-3 py-1.5 rounded-full">
       <i data-lucide="clock" class="w-4 h-4 text-red-500"></i> <span id="timer" class="text-sm font-700 text-red-600">00:00</span>
      </div>
     </div>
     <div class="w-full bg-slate-200 rounded-full h-2 mb-6">
      <div id="progress-bar" class="bg-blue-600 h-2 rounded-full progress-bar" style="width:5%"></div>
     </div>
     <div id="q-category" class="inline-block px-3 py-1 rounded-full text-xs font-600 mb-3 bg-emerald-100 text-emerald-700">
      IPA
     </div>
     <h2 id="q-text" class="text-lg font-700 text-slate-800 mb-6"></h2>
     <div id="options-container" class="space-y-3"></div>
     <div id="feedback" class="mt-4 hidden text-center p-3 rounded-xl font-600"></div><button id="next-btn" class="mt-6 w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-700 rounded-xl transition hidden"> Soal Berikutnya </button>
    </div>
   </div><!-- Result Screen -->
   <div id="result-screen" class="w-full max-w-4xl hidden fade-in">
    <div class="glass rounded-3xl p-6 md:p-8 card-shadow">
     <div class="text-center mb-6">
      <img src="https://iili.io/BLzqkYv.jpg" alt="Logo CMI" class="w-16 h-16 mx-auto rounded-xl object-cover mb-3" loading="lazy" onerror="this.style.background='#1e3a5f';">
      <h2 id="result-title" class="text-2xl font-800 text-slate-800">Hasil Kuis</h2>
     </div>
     <div id="score-display" class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6"></div>
     <h3 class="text-lg font-700 text-slate-800 mb-3">🏆 Daftar Ranking Nilai Siswa</h3>
     <div class="overflow-x-auto rounded-xl border border-slate-200">
      <table class="w-full text-sm">
       <thead class="bg-slate-800 text-white">
        <tr>
         <th class="px-3 py-2 text-left">No</th>
         <th class="px-3 py-2 text-left">Nama</th>
         <th class="px-3 py-2 text-left">Kelas</th>
         <th class="px-3 py-2 text-center">Waktu</th>
         <th class="px-3 py-2 text-center">Benar</th>
         <th class="px-3 py-2 text-center">Salah</th>
         <th class="px-3 py-2 text-center">Nilai</th>
         <th class="px-3 py-2 text-center">Keterangan</th>
        </tr>
       </thead>
       <tbody id="ranking-body"></tbody>
      </table>
     </div><button id="retry-btn" class="mt-6 w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-700 rounded-xl transition"> Kembali ke Login </button>
    </div>
   </div>
  </div>
  <script>
        const defaultConfig = {
            main_title: 'Simulasi Kompetisi CMI 2026',
            token_code: 'FT65V',
            background_color: '#0f172a',
            surface_color: '#ffffff',
            text_color: '#1e293b',
            primary_action: '#2563eb',
            secondary_action: '#64748b'
        };

        let allRecords = [];
        const questions = [
            {q:"Planet terbesar dalam tata surya adalah …",o:["Bumi","Mars","Jupiter","Venus"],a:2,cat:"IPA"},
            {q:"Organ tubuh manusia yang berfungsi memompa darah adalah …",o:["Paru-paru","Jantung","Hati","Ginjal"],a:1,cat:"IPA"},
            {q:"Perubahan wujud benda dari cair menjadi gas disebut …",o:["Membeku","Mengembun","Menguap","Mencair"],a:2,cat:"IPA"},
            {q:"Hewan yang berkembang biak dengan cara bertelur disebut …",o:["Vivipar","Ovipar","Ovovivipar","Mamalia"],a:1,cat:"IPA"},
            {q:"Sumber energi utama bagi kehidupan di bumi adalah …",o:["Air","Angin","Matahari","Batu bara"],a:2,cat:"IPA"},
            {q:"Bagian tumbuhan yang berfungsi menyerap air dan mineral adalah …",o:["Daun","Batang","Bunga","Akar"],a:3,cat:"IPA"},
            {q:"Gaya tarik bumi terhadap suatu benda disebut …",o:["Magnet","Gravitasi","Gesek","Pegas"],a:1,cat:"IPA"},
            {q:"Zat hijau daun yang membantu proses fotosintesis disebut …",o:["Hemoglobin","Kloroplas","Klorofil","Plasma"],a:2,cat:"IPA"},
            {q:"Contoh hewan herbivora adalah …",o:["Harimau","Sapi","Elang","Buaya"],a:1,cat:"IPA"},
            {q:"Lapisan atmosfer yang melindungi bumi dari sinar ultraviolet adalah …",o:["Troposfer","Stratosfer","Mesosfer","Termosfer"],a:1,cat:"IPA"},
            {q:"Alat untuk mengukur suhu adalah …",o:["Neraca","Barometer","Termometer","Higrometer"],a:2,cat:"IPA"},
            {q:"Campuran antara air dan minyak termasuk campuran …",o:["Homogen","Heterogen","Larutan","Senyawa"],a:1,cat:"IPA"},
            {q:"Planet yang dikenal sebagai planet merah adalah …",o:["Saturnus","Uranus","Mars","Merkurius"],a:2,cat:"IPA"},
            {q:"Ibu kota negara Indonesia adalah …",o:["Bandung","Surabaya","Jakarta","Medan"],a:2,cat:"IPS"},
            {q:"Benua terbesar di dunia adalah …",o:["Afrika","Asia","Eropa","Amerika"],a:1,cat:"IPS"},
            {q:"Tokoh proklamator Indonesia adalah …",o:["Ki Hajar Dewantara dan Soedirman","Soekarno dan Mohammad Hatta","Ahmad Dahlan dan HOS Cokroaminoto","Sultan Hasanuddin dan Diponegoro"],a:1,cat:"IPS"},
            {q:"ASEAN merupakan organisasi negara-negara di kawasan …",o:["Asia Selatan","Asia Timur","Asia Tenggara","Timur Tengah"],a:2,cat:"IPS"},
            {q:"Mata uang negara Jepang adalah …",o:["Won","Ringgit","Yen","Dolar"],a:2,cat:"IPS"},
            {q:"Sungai terpanjang di dunia adalah …",o:["Sungai Nil","Sungai Amazon","Sungai Musi","Sungai Gangga"],a:0,cat:"IPS"},
            {q:"Pahlawan wanita Indonesia yang terkenal memperjuangkan emansipasi wanita adalah …",o:["Dewi Sartika","Cut Nyak Dien","Martha Christina Tiahahu","RA Kartini"],a:3,cat:"IPS"}
        ];

        let currentQ = 0, score = 0, answered = false, timerInterval, seconds = 0;
        let studentName = '', studentClass = '';

        // Timer
        function startTimer() {
            seconds = 0;
            timerInterval = setInterval(() => {
                seconds++;
                const m = String(Math.floor(seconds/60)).padStart(2,'0');
                const s = String(seconds%60).padStart(2,'0');
                document.getElementById('timer').textContent = `${m}:${s}`;
            }, 1000);
        }
        function stopTimer() { clearInterval(timerInterval); }
        function formatTime(sec) {
            return `${String(Math.floor(sec/60)).padStart(2,'0')}:${String(sec%60).padStart(2,'0')}`;
        }

        // Login
        document.getElementById('start-btn').addEventListener('click', (e) => {
            e.preventDefault();
            const nama = document.getElementById('nama-input').value.trim();
            const kelas = document.getElementById('kelas-input').value;
            const token = document.getElementById('token-input').value.trim();
            const errEl = document.getElementById('login-error');

            if (!nama || !kelas || !token) {
                errEl.textContent = 'Semua field harus diisi!'; errEl.classList.remove('hidden'); return;
            }
            const validToken = window.elementSdk?.config?.token_code || defaultConfig.token_code;
            if (token !== validToken) {
                errEl.textContent = 'Token tidak valid!'; errEl.classList.remove('hidden'); return;
            }
            errEl.classList.add('hidden');
            studentName = nama; studentClass = kelas;
            currentQ = 0; score = 0;
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            startTimer();
            renderQuestion();
        });

        function renderQuestion() {
            answered = false;
            const q = questions[currentQ];
            document.getElementById('q-number').textContent = `${currentQ+1}/20`;
            document.getElementById('progress-bar').style.width = `${((currentQ+1)/20)*100}%`;
            document.getElementById('q-category').textContent = q.cat;
            document.getElementById('q-category').className = q.cat === 'IPA' ? 'inline-block px-3 py-1 rounded-full text-xs font-600 mb-3 bg-emerald-100 text-emerald-700' : 'inline-block px-3 py-1 rounded-full text-xs font-600 mb-3 bg-amber-100 text-amber-700';
            document.getElementById('q-text').textContent = `${currentQ+1}. ${q.q}`;
            document.getElementById('feedback').classList.add('hidden');
            document.getElementById('next-btn').classList.add('hidden');

            const container = document.getElementById('options-container');
            container.innerHTML = '';
            const labels = ['A','B','C','D'];
            q.o.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn w-full text-left px-4 py-3 rounded-xl border-2 border-slate-200 font-500 text-slate-700 hover:border-blue-400';
                btn.innerHTML = `<span class="font-700 text-blue-600 mr-2">${labels[i]}.</span> ${opt}`;
                btn.onclick = () => selectAnswer(i);
                container.appendChild(btn);
            });
        }

        function selectAnswer(idx) {
            if (answered) return;
            answered = true;
            const q = questions[currentQ];
            const btns = document.querySelectorAll('.option-btn');
            const fb = document.getElementById('feedback');

            btns[q.a].classList.add('correct');
            if (idx === q.a) {
                score++;
                fb.textContent = '✅ Benar!';
                fb.className = 'mt-4 text-center p-3 rounded-xl font-600 bg-green-100 text-green-700';
            } else {
                btns[idx].classList.add('wrong');
                fb.textContent = '❌ Salah! Jawaban yang benar: ' + ['A','B','C','D'][q.a];
                fb.className = 'mt-4 text-center p-3 rounded-xl font-600 bg-red-100 text-red-700';
            }
            fb.classList.remove('hidden');

            if (currentQ < 19) {
                document.getElementById('next-btn').classList.remove('hidden');
            } else {
                const finBtn = document.getElementById('next-btn');
                finBtn.textContent = 'Lihat Hasil';
                finBtn.classList.remove('hidden');
            }
        }

        document.getElementById('next-btn').addEventListener('click', () => {
            if (currentQ < 19) { currentQ++; renderQuestion(); }
            else { finishQuiz(); }
        });

        async function finishQuiz() {
            stopTimer();
            const nilaiAkhir = (score / 20) * 100;
            const keterangan = nilaiAkhir >= 75 ? 'Lulus' : 'Tidak Lulus';
            const waktuStr = formatTime(seconds);

            // Save
            if (allRecords.length < 999) {
                await window.dataSdk.create({
                    nama: studentName, kelas: studentClass, waktu: waktuStr,
                    waktu_detik: seconds, jumlah_benar: score, jumlah_salah: 20 - score,
                    nilai_akhir: nilaiAkhir, keterangan: keterangan, created_at: new Date().toISOString()
                });
            }

            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');

            // Score display
            document.getElementById('score-display').innerHTML = `
                <div class="bg-blue-50 rounded-xl p-4 text-center"><p class="text-xs text-slate-500">Benar</p><p class="text-2xl font-800 text-blue-600">${score}</p></div>
                <div class="bg-red-50 rounded-xl p-4 text-center"><p class="text-xs text-slate-500">Salah</p><p class="text-2xl font-800 text-red-600">${20-score}</p></div>
                <div class="bg-emerald-50 rounded-xl p-4 text-center"><p class="text-xs text-slate-500">Nilai</p><p class="text-2xl font-800 text-emerald-600">${nilaiAkhir}</p></div>
                <div class="bg-purple-50 rounded-xl p-4 text-center"><p class="text-xs text-slate-500">Waktu</p><p class="text-2xl font-800 text-purple-600">${waktuStr}</p></div>
            `;
            renderRanking();
        }

        function renderRanking() {
            const sorted = [...allRecords].sort((a,b) => b.nilai_akhir - a.nilai_akhir || a.waktu_detik - b.waktu_detik);
            const tbody = document.getElementById('ranking-body');
            tbody.innerHTML = sorted.map((r, i) => `
                <tr class="border-b border-slate-100 ${i%2===0?'bg-white':'bg-slate-50'}">
                    <td class="px-3 py-2 font-600">${i+1}</td>
                    <td class="px-3 py-2">${r.nama}</td>
                    <td class="px-3 py-2">${r.kelas}</td>
                    <td class="px-3 py-2 text-center">${r.waktu}</td>
                    <td class="px-3 py-2 text-center font-600 text-green-600">${r.jumlah_benar}</td>
                    <td class="px-3 py-2 text-center font-600 text-red-600">${r.jumlah_salah}</td>
                    <td class="px-3 py-2 text-center font-800">${r.nilai_akhir}</td>
                    <td class="px-3 py-2 text-center"><span class="px-2 py-1 rounded-full text-xs font-700 ${r.nilai_akhir>=75?'bg-green-100 text-green-700':'bg-red-100 text-red-700'}">${r.keterangan}</span></td>
                </tr>
            `).join('');
        }

        document.getElementById('retry-btn').addEventListener('click', () => {
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('nama-input').value = '';
            document.getElementById('kelas-input').value = '';
            document.getElementById('token-input').value = '';
            document.getElementById('next-btn').textContent = 'Soal Berikutnya';
        });

        // Data SDK
        const dataHandler = {
            onDataChanged(data) {
                allRecords = data;
                if (!document.getElementById('result-screen').classList.contains('hidden')) renderRanking();
            }
        };

        // Element SDK
        window.elementSdk.init({
            defaultConfig,
            onConfigChange: async (config) => {
                const title = config.main_title || defaultConfig.main_title;
                document.getElementById('main-title').textContent = title;
                document.getElementById('result-title').textContent = 'Hasil - ' + title;
            },
            mapToCapabilities: (config) => ({
                recolorables: [
                    { get: () => config.background_color || defaultConfig.background_color, set: v => { config.background_color = v; window.elementSdk.setConfig({background_color:v}); }},
                    { get: () => config.surface_color || defaultConfig.surface_color, set: v => { config.surface_color = v; window.elementSdk.setConfig({surface_color:v}); }},
                    { get: () => config.text_color || defaultConfig.text_color, set: v => { config.text_color = v; window.elementSdk.setConfig({text_color:v}); }},
                    { get: () => config.primary_action || defaultConfig.primary_action, set: v => { config.primary_action = v; window.elementSdk.setConfig({primary_action:v}); }},
                    { get: () => config.secondary_action || defaultConfig.secondary_action, set: v => { config.secondary_action = v; window.elementSdk.setConfig({secondary_action:v}); }}
                ],
                borderables: [],
                fontEditable: undefined,
                fontSizeable: undefined
            }),
            mapToEditPanelValues: (config) => new Map([
                ['main_title', config.main_title || defaultConfig.main_title],
                ['token_code', config.token_code || defaultConfig.token_code]
            ])
        });

        window.dataSdk.init(dataHandler);
        lucide.createIcons();
    </script>
